name: SecureVault Pro CI/CD

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-test:
    name: Build & Test Pipeline
    runs-on: ubuntu-latest

    steps:
    # =========================
    # 1. Checkout Code
    # =========================
    - name: Checkout Repository
      uses: actions/checkout@v4

    # =========================
    # 2. Setup Python
    # =========================
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    # =========================
    # 3. Upgrade pip
    # =========================
    - name: Upgrade pip
      run: |
        python -m pip install --upgrade pip

    # =========================
    # 4. Install System Dependencies (OCR support)
    # =========================
    - name: Install System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y tesseract-ocr

    # =========================
    # 5. Install Python Dependencies
    # =========================
    - name: Install Requirements
      run: |
        pip install -r requirements.txt

    # =========================
    # 6. Code Quality Check
    # =========================
    - name: Python Syntax Check
      run: |
        python -m py_compile app.py

    # =========================
    # 7. App Smoke Test
    # =========================
    - name: Application Import Test
      run: |
        python -c "from app import app; print('✅ Flask App Loaded Successfully')"

    # =========================
    # 8. Security Check (Basic)
    # =========================
    - name: Basic Security Scan
      run: |
        pip install bandit
        bandit -r . || true

    # =========================
    # 9. Docker Build
    # =========================
    - name: Build Docker Image
      run: |
        docker build -t securevault-pro .

    # =========================
    # 10. Docker Run Test
    # =========================
    - name: Run Docker Container Test
      run: |
        docker run --rm securevault-pro python -c "print('🚀 Docker Container Working')"