name: SecureVault Pro CI/CD

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
    # =========================
    # 1. Checkout code
    # =========================
    - name: Checkout Repository
      uses: actions/checkout@v4

    # =========================
    # 2. Setup Python
    # =========================
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    # =========================
    # 3. Upgrade pip (IMPORTANT FIX)
    # =========================
    - name: Upgrade pip tools
      run: |
        python -m pip install --upgrade pip setuptools wheel

    # =========================
    # 4. Debug: show files (IMPORTANT)
    # =========================
    - name: Check repository files
      run: |
        ls -R

    # =========================
    # 5. Install dependencies (FORCED CLEAN INSTALL)
    # =========================
    - name: Install Requirements
      run: |
        python -m pip install --no-cache-dir -r requirements.txt

    # =========================
    # 6. VERIFY Flask install (IMPORTANT DEBUG STEP)
    # =========================
    - name: Verify Flask Installation
      run: |
        python -c "import flask; print('Flask OK')"
        pip show flask

    # =========================
    # 7. Syntax check
    # =========================
    - name: Python Syntax Check
      run: |
        python -m py_compile app.py

    # =========================
    # 8. Import test
    # =========================
    - name: Import Test
      run: |
        python -c "import flask; from app import app; print('APP LOADED')"

    # =========================
    # 9. Install Bandit + scan
    # =========================
    - name: Security Scan
      run: |
        pip install bandit
        bandit -r . || true

    # =========================
    # 10. Docker build
    # =========================
    - name: Build Docker Image
      run: |
        docker build -t securevault-pro .

    # =========================
    # 11. Docker test
    # =========================
    - name: Run Docker Test
      run: |
        docker run --rm securevault-pro python -c "print('Docker OK')"