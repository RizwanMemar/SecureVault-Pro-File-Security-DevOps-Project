name: SecureVault Pro CI/CD

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-test:
    name: Build & Test Pipeline
    runs-on: ubuntu-latest

    steps:
    # =========================
    # 1. Checkout Code
    # =========================
    - name: Checkout Repository
      uses: actions/checkout@v4

    # =========================
    # 2. Setup Python
    # =========================
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    # =========================
    # 3. Upgrade pip + tools
    # =========================
    - name: Upgrade pip and tools
      run: |
        python -m pip install --upgrade pip setuptools wheel

    # =========================
    # 4. Install System Dependencies (OCR support)
    # =========================
    - name: Install System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y tesseract-ocr

    # =========================
    # 5. Install Python Dependencies (SAFE MODE)
    # =========================
    - name: Install Requirements
      run: |
        python -m pip install --no-cache-dir -r requirements.txt

    # =========================
    # 6. Verify Environment (IMPORTANT DEBUG STEP)
    # =========================
    - name: Verify Python Environment
      run: |
        python -c "import sys; print('Python path:', sys.executable)"
        python -m pip list

    # =========================
    # 7. Verify Flask Installation
    # =========================
    - name: Verify Flask Installation
      run: |
        python -c "import flask; print('Flask installed successfully')"

    # =========================
    # 8. Code Quality Check
    # =========================
    - name: Python Syntax Check
      run: |
        python -m py_compile app.py

    # =========================
    # 9. App Smoke Test
    # =========================
    - name: Application Import Test
      run: |
        python -c "import flask; import app; print('✅ Flask App Loaded Successfully')"

    # =========================
    # 10. Security Scan
    # =========================
    - name: Basic Security Scan
      run: |
        python -m pip install bandit
        bandit -r . || true

    # =========================
    # 11. Docker Build
    # =========================
    - name: Build Docker Image
      run: |
        docker build -t securevault-pro .

    # =========================
    # 12. Docker Test Run
    # =========================
    - name: Run Docker Container Test
      run: |
        docker run --rm securevault-pro python -c "print('🚀 Docker Container Working')"