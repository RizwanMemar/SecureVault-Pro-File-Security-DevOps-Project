<!DOCTYPE html>
<html>
<head>
    <title>File Hash Generator</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="container">
    <h1>Secure File Hash Generator</h1>

    <form method="POST" enctype="multipart/form-data">
        <input type="file" name="file" required>
        <button type="submit">Generate Hashes</button>
    </form>

    {% if hashes %}
    <div class="results">
        <h2>Generated Hashes</h2>

        <p><strong>MD5:</strong></p>
        <textarea readonly>{{ hashes.md5 }}</textarea>

        <p><strong>SHA1:</strong></p>
        <textarea readonly>{{ hashes.sha1 }}</textarea>

        <p><strong>SHA256:</strong></p>
        <textarea readonly>{{ hashes.sha256 }}</textarea>
    </div>
    {% endif %}
</div>

</body>
</html>
